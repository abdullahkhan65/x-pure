name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://xpure:xpure_ci_password@localhost:5432/xpure?schema=public
  SEED_ADMIN_EMAIL: admin@xpure.dev
  SEED_ADMIN_PASSWORD: CiOnly123!
  SEED_DEMO_DATA: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xpure
          POSTGRES_PASSWORD: xpure_ci_password
          POSTGRES_DB: xpure
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xpure"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply migrations
        run: pnpm db:migrate:deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Build
        run: pnpm build
